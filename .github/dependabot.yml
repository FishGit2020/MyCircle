version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Major upgrades handled manually (React 19, Vite 7, Tailwind 4, etc.)
      - dependency-name: "react"
        update-types: [version-update:semver-major]
      - dependency-name: "react-dom"
        update-types: [version-update:semver-major]
      - dependency-name: "vite"
        update-types: [version-update:semver-major]
      - dependency-name: "tailwindcss"
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: "/functions"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
