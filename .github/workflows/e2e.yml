name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Detect whether source code changed (skip expensive jobs for docs-only PRs)
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.vscode/**'

  # ── Shared setup: install + build once, cache for both test jobs ──────
  setup:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    # Cancel older setup runs for the same branch to save minutes
    concurrency:
      group: e2e-setup-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm firebase:build
        env:
          # Fallback values for Dependabot PRs which cannot access secrets.
          # The emulator tests only talk to localhost, so the actual keys don't matter —
          # they just need to be non-empty so Firebase initializes.
          VITE_APPCHECK_DEBUG_TOKEN: ${{ secrets.APPCHECK_DEBUG_TOKEN || 'emulator-debug-token' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'fake-api-key-for-emulator' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'localhost' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'mycircle-dash' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'mycircle-dash.appspot.com' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:0000000000000000' }}

      - name: Cache build output for test jobs
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            functions/lib
            functions/node_modules
            dist
          key: e2e-build-${{ github.sha }}

  # ── E2E tests against live Firebase (sharded) ─────────────────────────
  e2e:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-shard-${{ matrix.shard }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore build
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            functions/lib
            functions/node_modules
            dist
          key: e2e-build-${{ github.sha }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E tests (shard ${{ matrix.shard }})
        run: pnpm test:e2e --shard=${{ matrix.shard }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ strategy.job-index }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ── E2E tests against Firebase emulator ──────────────────────────────
  e2e-emulator:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-emulator-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Restore build
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            functions/lib
            functions/node_modules
            dist
          key: e2e-build-${{ github.sha }}

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firebase.json') }}

      - name: Cache Playwright browsers
        id: pw-cache-emulator
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache-emulator.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache-emulator.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run emulator E2E tests
        run: pnpm emulator:test

      - name: Upload Playwright report (emulator)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-emulator
          path: playwright-report/
          retention-days: 14

  # ── Gate job for branch protection (single "e2e-gate" check) ─────────
  # Always runs so the required "e2e-gate" status check is reported even for docs-only PRs
  e2e-gate:
    if: always()
    needs: [changes, e2e, e2e-emulator]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          # Release Please PRs only bump version/changelog — skip E2E
          if [[ "${{ github.head_ref }}" == release-please--* ]]; then
            echo "Release Please PR — auto-passing gate"
            exit 0
          fi
          # If no source changes, all jobs were skipped — that's OK
          if [ "${{ needs.changes.outputs.src }}" != "true" ]; then
            echo "No source changes — skipping E2E (docs/config-only PR)"
            exit 0
          fi
          if [ "${{ needs.e2e.result }}" != "success" ] || [ "${{ needs.e2e-emulator.result }}" != "success" ]; then
            echo "Required jobs failed: e2e=${{ needs.e2e.result }}, e2e-emulator=${{ needs.e2e-emulator.result }}"
            exit 1
          fi
          echo "All e2e jobs passed"
