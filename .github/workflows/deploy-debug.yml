name: Deploy Auth Debug

# Temporary diagnostic — manual trigger only. Surfaces the real WIF auth
# error that firebase-tools swallows at debug level during `Deploy`.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  auth-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/441498720264/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@mycircle-dash.iam.gserviceaccount.com'

      - name: Dump auth env + credentials file
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"
          echo "----- credentials file (redacted token paths) -----"
          cat "$GOOGLE_APPLICATION_CREDENTIALS" | sed -E 's/("token"|"access_token"|"id_token")\s*:\s*"[^"]*"/\1:"REDACTED"/g'
          echo "----- firebase-tools version -----"
          pnpm exec firebase --version

      - name: Probe ADC token exchange directly (google-auth-library)
        run: |
          node -e "
          const { GoogleAuth } = require('google-auth-library');
          (async () => {
            try {
              const auth = new GoogleAuth({ scopes: ['https://www.googleapis.com/auth/cloud-platform'] });
              const client = await auth.getClient();
              const t = await client.getAccessToken();
              console.log('ADC getAccessToken OK, token length:', (t.token||'').length);
              const creds = await client.getCredentials().catch(e => ({ err: e.message }));
              console.log('client_email:', creds.client_email || '(none)');
            } catch (e) {
              console.error('ADC FAILED:', e.stack || e.message);
              process.exit(1);
            }
          })();
          "

      - name: firebase auth check with --debug
        run: pnpm exec firebase projects:list --debug
