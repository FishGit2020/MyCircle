name: Release Please Checks

# Release Please pushes to its branch using GITHUB_TOKEN, which does NOT
# trigger pull_request events (GitHub prevents infinite loops). This means
# the CI and E2E workflows never run, and the required "ci" and "e2e-gate"
# status checks stay in "Waiting for status to be reported" forever.
#
# This lightweight workflow detects release-please PRs and posts the
# required status checks as passing, since these PRs only change
# CHANGELOG.md, package.json, and .release-please-manifest.json.

on:
  pull_request:
    branches: [main]

permissions:
  statuses: write

jobs:
  release-please-gate:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Post ci status check
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'ci',
              description: 'Skipped for Release Please PR (no source changes)',
            });

      - name: Post e2e-gate status check
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'e2e-gate',
              description: 'Skipped for Release Please PR (no source changes)',
            });

      - name: Post spec-check status check
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'spec-check',
              description: 'Skipped for Release Please PR (no source changes)',
            });
