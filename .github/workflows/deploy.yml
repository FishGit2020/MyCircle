name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'
      - '.env.emulator'
      - 'e2e/**'
      - 'playwright*.config.ts'
      - 'scripts/mock-api-server.mjs'
      - 'scripts/seed-firestore.mjs'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production

jobs:
  deploy:
    if: "!startsWith(github.event.head_commit.message, 'chore(main): release')"
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm firebase:build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_SENTRY_RELEASE: ${{ github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/441498720264/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@mycircle-dash.iam.gserviceaccount.com'

      - name: Deploy hosting
        run: npx firebase-tools deploy --only hosting --project mycircle-dash

      - name: Deploy functions and firestore
        run: npx firebase-tools deploy --only functions,firestore --project mycircle-dash

      - name: Create Sentry release and upload source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          npx @sentry/cli releases new "$SENTRY_RELEASE"
          npx @sentry/cli releases set-commits "$SENTRY_RELEASE" --auto
          npx @sentry/cli sourcemaps upload --release "$SENTRY_RELEASE" dist/firebase/shell/assets/
          npx @sentry/cli releases finalize "$SENTRY_RELEASE"
          npx @sentry/cli releases deploys "$SENTRY_RELEASE" new -e production
        env:
          SENTRY_ORG: youpeng-huang
          SENTRY_PROJECT: javascript-react
          SENTRY_RELEASE: ${{ github.sha }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      E2E_APPCHECK_DEBUG_TOKEN: ${{ secrets.APPCHECK_DEBUG_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache-smoke
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache-smoke.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache-smoke.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for CDN propagation
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mycircle-dash.web.app)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Health check passed — HTTP $STATUS"

      - name: Run smoke tests
        run: pnpm test:e2e:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 14
