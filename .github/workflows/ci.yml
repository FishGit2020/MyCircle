name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared setup: install, check versions, build shared ────────────────
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check shared dependency versions
        run: node scripts/check-shared-versions.mjs

      - name: Build shared package
        run: pnpm build:shared

      - name: Cache workspace for downstream jobs
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

  # ── Typecheck (parallel with test) ─────────────────────────────────────
  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Typecheck all packages
        run: pnpm typecheck:all

  # ── Unit tests (sharded, parallel with typecheck) ─────────────────────
  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Unit tests (shard ${{ matrix.shard }})
        run: pnpm test:run --reporter=dot --shard=${{ matrix.shard }}
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Unit tests (changed MFE packages)
        if: matrix.shard == '1/2'
        run: |
          # Run tests only for packages with changes relative to main
          CHANGED=$(pnpm --filter '!mycircle' --filter '...[origin/main]' -r exec -- echo '$PNPM_PACKAGE_NAME' 2>/dev/null | grep '@mycircle/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed MFE packages — running all to be safe"
            pnpm --filter '!mycircle' -r --parallel test:run
          else
            echo "Changed packages: $CHANGED"
            pnpm --filter '!mycircle' --filter '...[origin/main]' -r --parallel test:run
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Bundle size report (parallel, non-blocking) ────────────────────────
  bundle-report:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build all packages
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Generate bundle size report
        run: |
          echo "# Bundle Size Report" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| Package | Files | Size |" >> bundle-report.md
          echo "|---------|-------|------|" >> bundle-report.md
          for dir in packages/*/dist; do
            pkg=$(basename $(dirname "$dir"))
            if [ -d "$dir" ]; then
              size=$(du -sh "$dir" 2>/dev/null | cut -f1)
              count=$(find "$dir" -type f | wc -l)
              echo "| $pkg | $count | $size |" >> bundle-report.md
            fi
          done
          cat bundle-report.md

      - name: Upload bundle size report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: bundle-report.md
          retention-days: 30

  # ── Lighthouse (parallel, non-blocking) ───────────────────────────────
  lighthouse:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build shell and MFEs
        run: pnpm firebase:build:mf

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30

  # ── Gate job for branch protection (preserves "ci" check name) ─────────
  ci:
    if: always()
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          # Matrix jobs report as a single "test" result — "success" only if ALL shards pass
          if [ "${{ needs.typecheck.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "Required jobs failed: typecheck=${{ needs.typecheck.result }}, test=${{ needs.test.result }}"
            exit 1
          fi
          echo "All required jobs passed"
