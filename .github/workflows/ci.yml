name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.vscode/**'

permissions:
  contents: read

jobs:
  # ── Shared setup: install, check versions, build shared ────────────────
  setup:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-setup-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check shared dependency versions
        run: node scripts/check-shared-versions.mjs

      - name: Build shared package
        run: pnpm build:shared

      - name: Cache workspace for downstream jobs
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

  # ── Lint (parallel with typecheck and test) ───────────────────────────
  lint:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: ESLint
        run: pnpm lint

  # ── Security audit (parallel, non-blocking) ─────────────────────────
  audit:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Security audit
        run: pnpm audit --audit-level=high

  # ── Typecheck (parallel with test) ─────────────────────────────────────
  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Typecheck all packages
        run: pnpm typecheck:all

  # ── Unit tests: root (shell + shared) ─────────────────────────────────
  test-root:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-test-root-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Unit tests (root — shell + shared)
        run: pnpm test:run --reporter=dot
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Unit tests: MFE packages ────────────────────────────────────────
  test-mfe:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-test-mfe-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Unit tests (changed MFE packages)
        run: |
          # Run tests only for packages with changes relative to main
          CHANGED=$(pnpm --filter '!mycircle' --filter '...[origin/main]' -r exec -- echo '$PNPM_PACKAGE_NAME' 2>/dev/null | grep '@mycircle/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed MFE packages — running all to be safe"
            pnpm --filter '!mycircle' -r --parallel test:run
          else
            echo "Changed packages: $CHANGED"
            pnpm --filter '!mycircle' --filter '...[origin/main]' -r --parallel test:run
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Bundle size report (parallel, non-blocking) ────────────────────────
  bundle-report:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build all packages
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Generate bundle size report
        run: |
          echo "# Bundle Size Report" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| Package | Files | Size |" >> bundle-report.md
          echo "|---------|-------|------|" >> bundle-report.md
          for dir in packages/*/dist; do
            pkg=$(basename $(dirname "$dir"))
            if [ -d "$dir" ]; then
              size=$(du -sh "$dir" 2>/dev/null | cut -f1)
              count=$(find "$dir" -type f | wc -l)
              echo "| $pkg | $count | $size |" >> bundle-report.md
            fi
          done
          cat bundle-report.md

      - name: Check shell bundle size limit
        run: |
          SHELL_SIZE=$(du -sb packages/shell/dist 2>/dev/null | cut -f1)
          LIMIT=5242880  # 5MB
          echo "Shell bundle: $(du -sh packages/shell/dist | cut -f1) ($SHELL_SIZE bytes, limit: $LIMIT)"
          if [ "$SHELL_SIZE" -gt "$LIMIT" ]; then
            echo "::warning::Shell bundle exceeds 5MB limit"
          fi

      - name: Upload bundle size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: bundle-report.md
          retention-days: 30

  # ── Lighthouse (parallel, non-blocking) ───────────────────────────────
  lighthouse:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build shell and MFEs
        run: pnpm firebase:build:mf

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30

  # ── Gate job for branch protection (preserves "ci" check name) ─────────
  ci:
    if: always()
    needs: [lint, typecheck, test-root, test-mfe]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          # Lint is non-blocking for now (continue-on-error) — tracked separately
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test-root.result }}" != "success" ] || \
             [ "${{ needs.test-mfe.result }}" != "success" ]; then
            echo "Required jobs failed: typecheck=${{ needs.typecheck.result }}, test-root=${{ needs.test-root.result }}, test-mfe=${{ needs.test-mfe.result }}"
            exit 1
          fi
          echo "All required jobs passed (lint=${{ needs.lint.result }})"
