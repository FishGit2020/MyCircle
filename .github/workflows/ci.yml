name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Detect whether source code changed (skip expensive jobs for docs-only PRs)
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.vscode/**'

  # ── Shared setup: install, check versions, build shared ────────────────
  setup:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: ci-setup-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check shared dependency versions
        run: node scripts/check-shared-versions.mjs

      - name: Build shared package
        run: pnpm build:shared

      - name: Cache workspace for downstream jobs
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

  # ── Lint (parallel, non-blocking — surfaces real issues) ──────────────
  lint:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: ESLint
        run: pnpm lint

  # ── Security audit (parallel, non-blocking — surfaces real issues) ───
  audit:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Security audit
        run: pnpm audit --audit-level=high

  # ── Typecheck (parallel with test) ─────────────────────────────────────
  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Typecheck all packages
        run: pnpm typecheck:all

  # ── Unit tests: root (shell + shared) ─────────────────────────────────
  test-root:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-test-root-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Unit tests (root — shell + shared)
        run: pnpm test:run --reporter=dot
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Unit tests: MFE packages ────────────────────────────────────────
  test-mfe:
    needs: setup
    runs-on: ubuntu-latest
    concurrency:
      group: ci-test-mfe-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Unit tests (changed MFE packages)
        run: |
          # Run tests only for packages with changes relative to main
          CHANGED=$(pnpm --filter '!mycircle' --filter '...[origin/main]' -r exec -- echo '$PNPM_PACKAGE_NAME' 2>/dev/null | grep '@mycircle/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed MFE packages — running all to be safe"
            pnpm --filter '!mycircle' -r --parallel test:run
          else
            echo "Changed packages: $CHANGED"
            pnpm --filter '!mycircle' --filter '...[origin/main]' -r --parallel test:run
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'

  # ── Bundle size report (parallel, non-blocking) ────────────────────────
  bundle-report:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build all packages
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Generate bundle size report
        run: |
          echo "# Bundle Size Report" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| Package | Files | Size |" >> bundle-report.md
          echo "|---------|-------|------|" >> bundle-report.md
          for dir in packages/*/dist; do
            pkg=$(basename $(dirname "$dir"))
            if [ -d "$dir" ]; then
              size=$(du -sh "$dir" 2>/dev/null | cut -f1)
              count=$(find "$dir" -type f | wc -l)
              echo "| $pkg | $count | $size |" >> bundle-report.md
            fi
          done
          cat bundle-report.md

      - name: Check bundle size limits
        run: |
          FAIL=0
          # Shell limit: 5MB
          SHELL_SIZE=$(du -sb packages/shell/dist 2>/dev/null | cut -f1)
          SHELL_LIMIT=5242880
          echo "Shell: $(du -sh packages/shell/dist | cut -f1) (limit: 5MB)"
          if [ "$SHELL_SIZE" -gt "$SHELL_LIMIT" ]; then
            echo "::error::Shell bundle exceeds 5MB limit ($SHELL_SIZE bytes)"
            FAIL=1
          fi
          # MFE limit: 2MB each
          MFE_LIMIT=2097152
          for dir in packages/*/dist; do
            pkg=$(basename $(dirname "$dir"))
            [ "$pkg" = "shell" ] || [ "$pkg" = "shared" ] && continue
            if [ -d "$dir" ]; then
              SIZE=$(du -sb "$dir" 2>/dev/null | cut -f1)
              if [ "$SIZE" -gt "$MFE_LIMIT" ]; then
                echo "::warning::$pkg bundle exceeds 2MB limit ($(du -sh "$dir" | cut -f1))"
              fi
            fi
          done
          # Total size check
          TOTAL=$(du -sb packages/*/dist 2>/dev/null | awk '{s+=$1} END{print s}')
          echo "Total bundle size: $(numfmt --to=iec $TOTAL)"
          echo "total_size=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload bundle size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: bundle-report.md
          retention-days: 30

  # ── Lighthouse (parallel, non-blocking) ───────────────────────────────
  lighthouse:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: workspace-${{ github.sha }}

      - name: Build shell and MFEs
        run: pnpm firebase:build:mf

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 30

  # ── Gate job for branch protection (preserves "ci" check name) ─────────
  # Always runs so the required "ci" status check is reported even for docs-only PRs
  ci:
    if: always()
    needs: [changes, lint, typecheck, test-root, test-mfe]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs
        run: |
          # Release Please PRs only bump version/changelog — skip CI
          if [[ "${{ github.head_ref }}" == release-please--* ]]; then
            echo "Release Please PR — auto-passing gate"
            exit 0
          fi
          # If no source changes, all jobs were skipped — that's OK
          if [ "${{ needs.changes.outputs.src }}" != "true" ]; then
            echo "No source changes — skipping CI (docs/config-only PR)"
            exit 0
          fi
          # Lint is non-blocking for now (continue-on-error) — tracked separately
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test-root.result }}" != "success" ] || \
             [ "${{ needs.test-mfe.result }}" != "success" ]; then
            echo "Required jobs failed: typecheck=${{ needs.typecheck.result }}, test-root=${{ needs.test-root.result }}, test-mfe=${{ needs.test-mfe.result }}"
            exit 1
          fi
          echo "All required jobs passed (lint=${{ needs.lint.result }})"
