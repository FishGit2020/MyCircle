# Ollama + Cloudflare Free Quick Tunnel (no account needed)
#
# Generates a random *.trycloudflare.com URL on startup.
# No Cloudflare account or domain required.
# See docs/ollama-setup.md for full setup instructions.
#
# GPU Support:
#   Check available hardware before running:
#     - GPU: nvidia-smi
#     - CPU: [System.Environment]::ProcessorCount (or Get-ComputerInfo -Property LogicalProcessorCount)
#     - Memory: Get-WmiObject -Class Win32_ComputerSystem | Select-Object TotalPhysicalMemory
#   If nvidia-smi works, GPU acceleration is enabled below.
#
# Configuration Note:
#   The following settings are optimized for: RTX 2080 (8GB VRAM), 20 CPU cores, 191GB RAM
#   - OLLAMA_NUM_PARALLEL=8      (adjust based on your CPU cores: cores/2 is a good baseline)
#   - OLLAMA_MAX_LOADED_MODELS=3 (adjust based on VRAM: 3-4 for 8GB VRAM, more for 16GB+)
#   - memory: 64G                (adjust based on available system RAM)
#
# Usage:
#   1. docker compose -f docker-compose.quick.yml up -d
#   2. docker exec ollama ollama pull qwen3:4b
#   3. docker logs cloudflared 2>&1 | grep "trycloudflare.com"
#   4. Copy the URL and add it as an endpoint in MyCircle
#
# Note: The URL changes on every restart. Update it in MyCircle's
#       AI Chat > Endpoints tab when that happens.

version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=8
      - OLLAMA_MAX_LOADED_MODELS=3
    deploy:
      resources:
        limits:
          memory: 64G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --url http://ollama:11434
    depends_on:
      - ollama
