# MyCircle SQL Analytics — Docker Compose
#
# Usage:
#   1. Copy this file or run from deploy/sql-proxy/
#   2. Change API_KEY and POSTGRES_PASSWORD
#   3. docker compose up -d
#   4. Get tunnel URL: docker logs mycircle-tunnel 2>&1 | grep trycloudflare.com
#   5. In MyCircle: Setup > SQL Connection > paste tunnel URL + API key
#
# No Cloudflare account needed — uses free quick tunnel.
# Tunnel URL changes on restart. For persistent URL, use a named tunnel.
#
# Adminer (web SQL UI):
#   URL:      http://localhost:8080
#   System:   PostgreSQL
#   Server:   postgres          ← use the service name, NOT the DB name
#   Username: postgres
#   Password: MyCircle2026!     ← or your custom POSTGRES_PASSWORD
#   Database: mycircle

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mycircle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MyCircle2026!
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  sql-proxy:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:MyCircle2026!@postgres:5432/mycircle
      API_KEY: sk-mycircle-x7k2p9q4
      PORT: "3080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://sql-proxy:3080
    depends_on:
      - sql-proxy
    restart: unless-stopped

volumes:
  pgdata:
